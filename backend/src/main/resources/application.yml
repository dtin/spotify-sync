server:
  port: ${PORT:8080}

spring:
  application:
    name: spotifysync

sentry:
  dsn: ${SENTRY_DSN:}
  traces-sample-rate: 1.0
  datasource:
    url: jdbc:h2:mem:spotifysync;DB_CLOSE_DELAY=-1
    driverClassName: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

spotify:
  client-id: ${SPOTIFY_CLIENT_ID:9b55437048a848f2bb077f20f30ee53f}
  client-secret: ${SPOTIFY_CLIENT_SECRET:a12044789e054d16bef40b2307427bc9}
  redirect-uri: ${SPOTIFY_REDIRECT_URI:https://spotisync.dpdns.org/api/auth/callback}
  scopes: playlist-read-private,playlist-read-collaborative,playlist-modify-public,playlist-modify-private,user-library-read,user-library-modify
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  api:
    host: ${SPOTIFY_API_HOST:https://api.spotify.com}
    accounts-host: ${SPOTIFY_ACCOUNTS_HOST:https://accounts.spotify.com}
    paths:
      authorize: ${SPOTIFY_PATH_AUTHORIZE:/authorize}
      token: ${SPOTIFY_PATH_TOKEN:/api/token}
      me: ${SPOTIFY_PATH_ME:/v1/me}
      playlists: ${SPOTIFY_PATH_PLAYLISTS:/v1/me/playlists}
      tracks: ${SPOTIFY_PATH_TRACKS:/v1/me/tracks}
      albums: ${SPOTIFY_PATH_ALBUMS:/v1/me/albums}
      users: ${SPOTIFY_PATH_USERS:/v1/users}
      base-playlists: ${SPOTIFY_PATH_BASE_PLAYLISTS:/v1/playlists}
    max-retries: ${SPOTIFY_API_MAX_RETRIES:3}
    limit:
      playlists: ${SPOTIFY_API_LIMIT_PLAYLISTS:50}
      tracks: ${SPOTIFY_API_LIMIT_TRACKS:50}
      albums: ${SPOTIFY_API_LIMIT_ALBUMS:50}
      sync-playlist-tracks: ${SPOTIFY_API_LIMIT_SYNC_TRACKS:100}

sync:
  thread-pool:
    core-size: ${SYNC_CORE_POOL_SIZE:2}
    max-size: ${SYNC_MAX_POOL_SIZE:5}
    queue-capacity: ${SYNC_QUEUE_CAPACITY:50}
